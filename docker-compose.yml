services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/health-credit-docs --ignore-existing;
        echo 'Bucket health-credit-docs ready';
      "
    profiles:
      - dev
      - test

  backend:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/health-credit
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret-change-me}
      - NODE_ENV=development
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET=health-credit-docs
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    profiles:
      - dev
      - test

  backend-prod:
    build:
      context: .
      target: prod
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/health-credit
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret-change-me}
      - NODE_ENV=production
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET=health-credit-docs
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - test

volumes:
  mongo-data:
  minio-data:
